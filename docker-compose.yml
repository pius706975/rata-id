services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_INITDB_ARGS: "-c client_encoding=UTF8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh
    networks:
      - healthcare_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  auth_service:
    build:
      context: ./auth_service
      dockerfile: Dockerfile
    container_name: auth_service
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./auth_service/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      DB_HOST: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${AUTH_DB}?schema=public&sslmode=prefer
    networks:
      - healthcare_network
    restart: on-failure

  schedule_service:
    build:
      context: ./schedule_service
      dockerfile: Dockerfile
    container_name: schedule_service
    ports:
      - "3002:3002"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./schedule_service/.env
    environment:
      NODE_ENV: production
      PORT: 3002
      DB_HOST: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${SCHEDULE_DB}?schema=public&sslmode=prefer
      AUTH_SERVICE_URL: http://auth_service:3001/graphql
    networks:
      - healthcare_network
    restart: on-failure

networks:
  healthcare_network:
    driver: bridge

volumes:
  postgres_data: